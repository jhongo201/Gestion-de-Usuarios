<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="idiger-navbar">

    <!-- Toggle sidebar móvil -->
    <button id="sidebarToggle" type="button">
        <i class="bi bi-list"></i>
    </button>

    <!-- Logo + nombre sistema -->
    <a class="navbar-brand" th:href="@{/dashboard}">
        <i class="bi bi-shield-lock-fill"></i>
        <span>Reportes Contractuales</span>
    </a>

    <!-- Spacer -->
    <div style="flex:1"></div>

    <!-- Entidad -->
    <span class="entidad-label d-none d-md-inline me-3"
          sec:authentication="principal.nombreEntidad">Entidad</span>

    <!-- Usuario dropdown -->
    <div class="dropdown">
        <button class="dropdown-toggle" type="button"
                data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle"></i>
            <span sec:authentication="principal.nombreCompleto">Usuario</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <span class="dropdown-item-text"
                      style="font-size:.8rem;color:#888"
                      sec:authentication="name">username</span>
            </li>
            <li>
                <span class="dropdown-item-text"
                      style="font-size:.8rem;color:#888"
                      sec:authentication="principal.nombreRol">rol</span>
            </li>
            <li><hr class="dropdown-divider"/></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <button type="submit" class="dropdown-item"
                            style="color:#c0392b">
                        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                    </button>
                </form>
            </li>
        </ul>
    </div>

</nav>
</body>
</html>
