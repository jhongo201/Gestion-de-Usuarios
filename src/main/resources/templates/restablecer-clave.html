<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Restablecer contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: #f6f8f5;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1f2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .reset-card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border: 1px solid #d9e2d4;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
            padding: 2rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-container img {
            max-width: 260px;
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: .65rem;
            color: #102010;
        }

        .subtitle {
            text-align: center;
            color: #526052;
            font-size: .94rem;
            margin-bottom: 1.6rem;
            line-height: 1.45;
        }

        .form-label {
            font-size: .9rem;
            font-weight: 600;
            color: #1f2a1f;
            margin-bottom: .35rem;
        }

        .form-control {
            border: 1px solid #b9cbb1;
            border-radius: 4px;
            min-height: 38px;
            font-size: .94rem;
        }

        .form-control:focus {
            border-color: #3d682c;
            box-shadow: 0 0 0 .2rem rgba(61, 104, 44, .16);
        }

        .input-group .form-control {
            border-right: none;
        }

        .input-group .btn-outline-secondary {
            border-color: #b9cbb1;
            color: #526052;
            background: #fff;
        }

        .input-group .btn-outline-secondary:hover {
            background: #f2f6f0;
            color: #2d4f20;
        }

        .policy {
            font-size: .82rem;
            color: #526052;
        }

        .btn-submit {
            width: 100%;
            background: #3d682c;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: .68rem 1.2rem;
            border-radius: 5px;
            margin-top: .6rem;
        }

        .btn-submit:hover {
            background: #315823;
            color: #fff;
        }

        .btn-back {
            display: inline-block;
            margin-top: 1.2rem;
            color: #16459b;
            font-weight: 600;
            text-decoration: none;
            font-size: .9rem;
        }

        .btn-back:hover {
            color: #0f2f70;
            text-decoration: underline;
        }

        .alert {
            font-size: .9rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <main class="reset-card">

        <div class="logo-container">
            <img th:src="@{/images/logo-idiger.png}"
                 alt="IDIGER - Instituto Distrital de Gestión de Riesgos y Cambio Climático" />
        </div>

        <h1>Restablecer contraseña</h1>

        <p class="subtitle">
            Ingrese el código enviado a su correo y defina una nueva contraseña.
        </p>

        <div th:if="${mensaje}" class="alert alert-success d-flex align-items-start gap-2">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${mensaje}">Código enviado correctamente.</span>
        </div>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-start gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${error}">No fue posible restablecer la contraseña.</span>
        </div>

        <form id="restablecerClaveForm"
              th:action="@{/restablecer-clave}"
              th:object="${restablecerClave}"
              method="post">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="mb-3">
                <label for="usuarioOCorreo" class="form-label">Usuario o correo *</label>
                <input type="text"
                       class="form-control"
                       id="usuarioOCorreo"
                       th:field="*{usuarioOCorreo}"
                       autocomplete="username"
                       required />
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('usuarioOCorreo')}"
                     th:errors="*{usuarioOCorreo}">
                </div>
            </div>

            <div class="mb-3">
                <label for="codigo" class="form-label">Código de recuperación *</label>
                <input type="text"
                       class="form-control"
                       id="codigo"
                       th:field="*{codigo}"
                       inputmode="numeric"
                       maxlength="6"
                       required />
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('codigo')}"
                     th:errors="*{codigo}">
                </div>
            </div>

            <div class="mb-3">
                <label for="nuevaClave" class="form-label">Nueva contraseña *</label>
                <div class="input-group">
                    <input type="password"
                           class="form-control"
                           id="nuevaClave"
                           th:field="*{nuevaClave}"
                           autocomplete="new-password"
                           required />
                    <button class="btn btn-outline-secondary"
                            type="button"
                            data-password-toggle="nuevaClave"
                            aria-label="Mostrar u ocultar contraseña">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div id="claveMsg" class="policy mt-1">
                    Mínimo 8 caracteres, mayúscula, minúscula, número y carácter especial.
                </div>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('nuevaClave')}"
                     th:errors="*{nuevaClave}">
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmarClave" class="form-label">Confirmar contraseña *</label>
                <div class="input-group">
                    <input type="password"
                           class="form-control"
                           id="confirmarClave"
                           th:field="*{confirmarClave}"
                           autocomplete="new-password"
                           required />
                    <button class="btn btn-outline-secondary"
                            type="button"
                            data-password-toggle="confirmarClave"
                            aria-label="Mostrar u ocultar confirmación">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div id="confirmarMsg" class="policy mt-1"></div>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('confirmarClave')}"
                     th:errors="*{confirmarClave}">
                </div>
            </div>

            <button type="submit" class="btn btn-submit">
                Actualizar contraseña <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="text-center">
            <a class="btn-back" th:href="@{/login}">
                <i class="bi bi-arrow-left me-1"></i>Volver al ingreso
            </a>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const nuevaClave = document.getElementById('nuevaClave');
            const confirmarClave = document.getElementById('confirmarClave');
            const form = document.getElementById('restablecerClaveForm');

            document.querySelectorAll('[data-password-toggle]').forEach(function (button) {
                button.addEventListener('click', function () {
                    const inputId = button.getAttribute('data-password-toggle');
                    const input = document.getElementById(inputId);
                    const icon = button.querySelector('i');

                    if (!input || !icon) {
                        return;
                    }

                    const mostrar = input.type === 'password';
                    input.type = mostrar ? 'text' : 'password';
                    icon.className = mostrar ? 'bi bi-eye-slash' : 'bi bi-eye';
                });
            });

            nuevaClave.addEventListener('input', function () {
                validarClave();
                validarConfirmacion();
            });

            confirmarClave.addEventListener('input', function () {
                validarConfirmacion();
            });

            form.addEventListener('submit', function (e) {
                if (!claveCumplePolitica(nuevaClave.value)) {
                    e.preventDefault();
                    validarClave();
                    nuevaClave.focus();
                    return;
                }

                if (nuevaClave.value !== confirmarClave.value) {
                    e.preventDefault();
                    validarConfirmacion();
                    confirmarClave.focus();
                }
            });
        });

        function claveCumplePolitica(clave) {
            return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(clave);
        }

        function validarClave() {
            const clave = document.getElementById('nuevaClave').value;
            const msg = document.getElementById('claveMsg');

            if (!clave) {
                msg.className = 'policy mt-1';
                msg.textContent = 'Mínimo 8 caracteres, mayúscula, minúscula, número y carácter especial.';
                return;
            }

            if (claveCumplePolitica(clave)) {
                msg.className = 'policy mt-1 text-success';
                msg.textContent = 'La contraseña cumple la política de seguridad.';
            } else {
                msg.className = 'policy mt-1 text-danger';
                msg.textContent = 'La contraseña no cumple la política de seguridad.';
            }
        }

        function validarConfirmacion() {
            const clave = document.getElementById('nuevaClave').value;
            const confirmar = document.getElementById('confirmarClave').value;
            const msg = document.getElementById('confirmarMsg');

            if (!confirmar) {
                msg.className = 'policy mt-1';
                msg.textContent = '';
                return;
            }

            if (clave === confirmar) {
                msg.className = 'policy mt-1 text-success';
                msg.textContent = 'Las contraseñas coinciden.';
            } else {
                msg.className = 'policy mt-1 text-danger';
                msg.textContent = 'Las contraseñas no coinciden.';
            }
        }
    </script>

</body>

</html>
