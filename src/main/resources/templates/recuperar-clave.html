<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Recuperar contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: #f6f8f5;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1f2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .recover-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border: 1px solid #d9e2d4;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
            padding: 2rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-container img {
            max-width: 260px;
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: .65rem;
            color: #102010;
        }

        .subtitle {
            text-align: center;
            color: #526052;
            font-size: .94rem;
            margin-bottom: 1.6rem;
            line-height: 1.45;
        }

        .form-label {
            font-size: .9rem;
            font-weight: 600;
            color: #1f2a1f;
            margin-bottom: .35rem;
        }

        .form-control {
            border: 1px solid #b9cbb1;
            border-radius: 4px;
            min-height: 38px;
            font-size: .94rem;
        }

        .form-control:focus {
            border-color: #3d682c;
            box-shadow: 0 0 0 .2rem rgba(61, 104, 44, .16);
        }

        .btn-submit {
            width: 100%;
            background: #3d682c;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: .68rem 1.2rem;
            border-radius: 5px;
            margin-top: .6rem;
        }

        .btn-submit:hover {
            background: #315823;
            color: #fff;
        }

        .btn-back {
            display: inline-block;
            margin-top: 1.2rem;
            color: #16459b;
            font-weight: 600;
            text-decoration: none;
            font-size: .9rem;
        }

        .btn-back:hover {
            color: #0f2f70;
            text-decoration: underline;
        }

        .alert {
            font-size: .9rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <main class="recover-card">

        <div class="logo-container">
            <img th:src="@{/images/logo-idiger.png}"
                 alt="IDIGER - Instituto Distrital de Gestión de Riesgos y Cambio Climático" />
        </div>

        <h1>Recuperar contraseña</h1>

        <p class="subtitle">
            Ingrese su usuario o correo registrado. Si la cuenta está activa,
            recibirá un código de recuperación.
        </p>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-start gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${error}">No fue posible procesar la solicitud.</span>
        </div>

        <form th:action="@{/recuperar-clave}"
              th:object="${recuperarClave}"
              method="post">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="mb-3">
                <label for="usuarioOCorreo" class="form-label">Usuario o correo *</label>
                <input type="text"
                       class="form-control"
                       id="usuarioOCorreo"
                       th:field="*{usuarioOCorreo}"
                       autocomplete="username"
                       required />

                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('usuarioOCorreo')}"
                     th:errors="*{usuarioOCorreo}">
                </div>
            </div>

            <button type="submit" class="btn btn-submit">
                Enviar código <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="text-center">
            <a class="btn-back" th:href="@{/login}">
                <i class="bi bi-arrow-left me-1"></i>Volver al ingreso
            </a>
        </div>

    </main>

</body>

</html>
