<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head th:replace="fragments/layout :: head('Dashboard')"></head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>
<div th:replace="fragments/sidebar :: sidebar"></div>

<main class="main-content">

    <!-- Encabezado página -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold text-dark">
                <i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard
            </h4>
            <small class="text-muted">Resumen del módulo de seguridad</small>
        </div>
        <span class="badge bg-primary px-3 py-2">
            <i class="bi bi-calendar3 me-1"></i>
            <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}">
                Fecha
            </span>
        </span>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="row g-4 mb-4">

        <div class="col-12 col-sm-6 col-xl-4">
            <div class="card stat-card p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon bg-primary bg-opacity-10">
                        <i class="bi bi-people-fill text-primary"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-dark"
                             th:text="${totalUsuarios}">0</div>
                        <div class="text-muted small">Usuarios activos</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-4">
            <div class="card stat-card p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon bg-success bg-opacity-10">
                        <i class="bi bi-person-badge-fill text-success"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-dark"
                             th:text="${totalRoles}">0</div>
                        <div class="text-muted small">Roles definidos</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-4">
            <div class="card stat-card p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon bg-warning bg-opacity-10">
                        <i class="bi bi-key-fill text-warning"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-dark"
                             th:text="${totalPermisos}">0</div>
                        <div class="text-muted small">Permisos registrados</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Accesos rápidos -->
    <div class="card table-card p-4" sec:authorize="hasAuthority('RC_ADMIN')">
        <h6 class="fw-bold mb-3">
            <i class="bi bi-lightning-charge me-2 text-warning"></i>
            Accesos rápidos
        </h6>
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <a th:href="@{/seguridad/usuarios}"
                   class="btn btn-outline-primary w-100">
                    <i class="bi bi-people d-block fs-4 mb-1"></i>
                    <small>Usuarios</small>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/seguridad/roles}"
                   class="btn btn-outline-success w-100">
                    <i class="bi bi-person-badge d-block fs-4 mb-1"></i>
                    <small>Roles</small>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/seguridad/permisos}"
                   class="btn btn-outline-warning w-100">
                    <i class="bi bi-key d-block fs-4 mb-1"></i>
                    <small>Permisos</small>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="#"
                   class="btn btn-outline-secondary w-100 disabled">
                    <i class="bi bi-file-earmark-bar-graph d-block fs-4 mb-1"></i>
                    <small>Reportes</small>
                </a>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
