<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head th:replace="fragments/layout :: head('Permisos')"></head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>
<div th:replace="fragments/sidebar :: sidebar"></div>

<main class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold text-dark">
                <i class="bi bi-key me-2 text-warning"></i>Permisos
            </h4>
            <small class="text-muted">Árbol de permisos del sistema</small>
        </div>
        <button class="btn btn-warning text-dark"
                data-bs-toggle="modal" data-bs-target="#modalCrearPermiso">
            <i class="bi bi-plus-lg me-2"></i>Nuevo permiso
        </button>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Descripción</th>
                        <th>Padre</th>
                        <th>Tipo</th>
                        <th class="text-center">Orden</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${permisos}">
                        <td th:text="${p.idPermiso}"></td>
                        <td>
                            <i th:if="${p.tipoEstilo == 'menu'}"
                               class="bi bi-list-ul me-2 text-primary"></i>
                            <i th:if="${p.tipoEstilo == 'accion'}"
                               class="bi bi-lightning me-2 text-warning"></i>
                            <i th:if="${p.tipoEstilo == 'raiz'}"
                               class="bi bi-diagram-3 me-2 text-success"></i>
                            <span th:text="${p.descripcion}"></span>
                        </td>
                        <td>
                            <span th:if="${p.descripcionPadre != null}"
                                  class="badge bg-light text-dark border"
                                  th:text="${p.descripcionPadre}">
                            </span>
                            <span th:unless="${p.descripcionPadre != null}"
                                  class="text-muted small">—</span>
                        </td>
                        <td>
                            <span th:if="${p.tipoEstilo == 'menu'}"
                                  class="badge bg-primary bg-opacity-10 text-primary">
                                Menú
                            </span>
                            <span th:if="${p.tipoEstilo == 'accion'}"
                                  class="badge bg-warning bg-opacity-10 text-warning">
                                Acción
                            </span>
                            <span th:if="${p.tipoEstilo == 'raiz'}"
                                  class="badge bg-success bg-opacity-10 text-success">
                                Raíz
                            </span>
                        </td>
                        <td class="text-center" th:text="${p.orden}"></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary"
                                    th:data-id="${p.idPermiso}"
                                    th:data-desc="${p.descripcion}"
                                    th:data-padre="${p.idPermisoPadre}"
                                    th:data-tipo="${p.tipoEstilo}"
                                    th:data-orden="${p.orden}"
                                    onclick="abrirEditarPermiso(this)">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(permisos)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            No hay permisos registrados
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Crear Permiso -->
    <div class="modal fade" id="modalCrearPermiso" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">Nuevo Permiso</h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>
                <form id="formCrearPermiso">
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Descripción *</label>
                                <input type="text" class="form-control"
                                       id="crearDescPermiso" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Permiso padre</label>
                                <select class="form-select" id="crearPadrePermiso">
                                    <option value="">Ninguno (nodo raíz)</option>
                                    <option th:each="p : ${permisos}"
                                            th:value="${p.idPermiso}"
                                            th:text="${p.descripcion}"></option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Tipo</label>
                                <select class="form-select" id="crearTipoPermiso">
                                    <option value="menu">Menú</option>
                                    <option value="accion">Acción</option>
                                    <option value="raiz">Raíz</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Orden</label>
                                <input type="number" class="form-control"
                                       id="crearOrdenPermiso" value="0" min="0"/>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning text-dark">
                            <i class="bi bi-save me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Editar Permiso -->
    <div class="modal fade" id="modalEditarPermiso" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Editar Permiso</h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                </div>
                <form id="formEditarPermiso">
                    <input type="hidden" id="editarIdPermiso"/>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Descripción *</label>
                                <input type="text" class="form-control"
                                       id="editarDescPermiso" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Permiso padre</label>
                                <select class="form-select" id="editarPadrePermiso">
                                    <option value="">Ninguno</option>
                                    <option th:each="p : ${permisos}"
                                            th:value="${p.idPermiso}"
                                            th:text="${p.descripcion}"></option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Tipo</label>
                                <select class="form-select" id="editarTipoPermiso">
                                    <option value="menu">Menú</option>
                                    <option value="accion">Acción</option>
                                    <option value="raiz">Raíz</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Orden</label>
                                <input type="number" class="form-control"
                                       id="editarOrdenPermiso" min="0"/>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Actualizar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
    const CTX = /*[[@{/}]]*/ '/';

    document.getElementById('formCrearPermiso').addEventListener('submit', async function(e) {
        e.preventDefault();
        const padre = document.getElementById('crearPadrePermiso').value;
        const body = {
            descripcion:    document.getElementById('crearDescPermiso').value,
            tipoEstilo:     document.getElementById('crearTipoPermiso').value,
            orden:          parseInt(document.getElementById('crearOrdenPermiso').value)
        };
        if (padre) body.idPermisoPadre = parseInt(padre);
        const r = await fetch(CTX + 'api/permisos', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        });
        if (r.ok) { location.reload(); }
        else {
            const err = await r.json();
            alert('Error: ' + (err.mensaje || 'No se pudo crear'));
        }
    });

    function abrirEditarPermiso(btn) {
        document.getElementById('editarIdPermiso').value    = btn.dataset.id;
        document.getElementById('editarDescPermiso').value  = btn.dataset.desc;
        document.getElementById('editarTipoPermiso').value  = btn.dataset.tipo;
        document.getElementById('editarOrdenPermiso').value = btn.dataset.orden;
        const sel = document.getElementById('editarPadrePermiso');
        sel.value = btn.dataset.padre || '';
        new bootstrap.Modal(
            document.getElementById('modalEditarPermiso')
        ).show();
    }

    document.getElementById('formEditarPermiso').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id    = document.getElementById('editarIdPermiso').value;
        const padre = document.getElementById('editarPadrePermiso').value;
        const body = {
            descripcion: document.getElementById('editarDescPermiso').value,
            tipoEstilo:  document.getElementById('editarTipoPermiso').value,
            orden:       parseInt(document.getElementById('editarOrdenPermiso').value)
        };
        if (padre) body.idPermisoPadre = parseInt(padre);
        const r = await fetch(CTX + 'api/permisos/' + id, {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        });
        if (r.ok) { location.reload(); }
        else {
            const err = await r.json();
            alert('Error: ' + (err.mensaje || 'No se pudo actualizar'));
        }
    });
</script>
</body>
</html>
