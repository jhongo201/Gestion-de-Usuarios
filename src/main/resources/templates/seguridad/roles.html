<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head th:replace="fragments/layout :: head('Roles')"></head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>
<div th:replace="fragments/sidebar :: sidebar"></div>

<main class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold text-dark">
                <i class="bi bi-person-badge me-2 text-success"></i>Roles
            </h4>
            <small class="text-muted">Gestión de roles del sistema</small>
        </div>
        <button class="btn btn-success"
                data-bs-toggle="modal" data-bs-target="#modalCrearRol">
            <i class="bi bi-plus-lg me-2"></i>Nuevo rol
        </button>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre del rol</th>
                        <th class="text-center">Usuarios asignados</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${roles}">
                        <td th:text="${r.idRol}"></td>
                        <td>
                            <i class="bi bi-person-badge me-2 text-success"></i>
                            <span th:text="${r.nombreRol}"></span>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-secondary rounded-pill"
                                  th:text="${r.totalUsuarios}"></span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-1"
                                    th:data-id="${r.idRol}"
                                    th:data-nombre="${r.nombreRol}"
                                    onclick="abrirEditarRol(this)">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <a class="btn btn-sm btn-outline-info"
                               th:href="@{/seguridad/roles/} + ${r.idRol} + '/permisos'">
                                <i class="bi bi-key"></i> Permisos
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(roles)}">
                        <td colspan="4" class="text-center text-muted py-4">
                            No hay roles registrados
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Crear Rol -->
    <div class="modal fade" id="modalCrearRol" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Nuevo Rol</h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                </div>
                <form id="formCrearRol">
                    <div class="modal-body">
                        <label class="form-label fw-semibold">Nombre del rol *</label>
                        <input type="text" class="form-control text-uppercase"
                               id="crearNombreRol"
                               placeholder="Ej: SUPERVISOR_RC" required/>
                        <small class="text-muted">Se guardará en mayúsculas.</small>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Editar Rol -->
    <div class="modal fade" id="modalEditarRol" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">Editar Rol</h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>
                <form id="formEditarRol">
                    <input type="hidden" id="editarIdRol"/>
                    <div class="modal-body">
                        <label class="form-label fw-semibold">Nombre del rol *</label>
                        <input type="text" class="form-control text-uppercase"
                               id="editarNombreRol" required/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save me-1"></i>Actualizar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
    const CTX = /*[[@{/}]]*/ '/';

    document.getElementById('formCrearRol').addEventListener('submit', async function(e) {
        e.preventDefault();
        const r = await fetch(CTX + 'api/roles', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                nombreRol: document.getElementById('crearNombreRol').value
            })
        });
        if (r.ok) { location.reload(); }
        else {
            const err = await r.json();
            alert('Error: ' + (err.mensaje || 'No se pudo crear el rol'));
        }
    });

    function abrirEditarRol(btn) {
        document.getElementById('editarIdRol').value    = btn.dataset.id;
        document.getElementById('editarNombreRol').value = btn.dataset.nombre;
        new bootstrap.Modal(
            document.getElementById('modalEditarRol')
        ).show();
    }

    document.getElementById('formEditarRol').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('editarIdRol').value;
        const r = await fetch(CTX + 'api/roles/' + id, {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                nombreRol: document.getElementById('editarNombreRol').value
            })
        });
        if (r.ok) { location.reload(); }
        else {
            const err = await r.json();
            alert('Error: ' + (err.mensaje || 'No se pudo actualizar'));
        }
    });
</script>
</body>
</html>
