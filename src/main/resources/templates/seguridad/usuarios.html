<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head th:replace="fragments/layout :: head('Usuarios')"></head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>
<div th:replace="fragments/sidebar :: sidebar"></div>

<main class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold text-dark">
                <i class="bi bi-people me-2 text-primary"></i>Usuarios
            </h4>
            <small class="text-muted">Gestión de usuarios del sistema</small>
        </div>
        <button class="btn btn-primary"
                data-bs-toggle="modal" data-bs-target="#modalCrearUsuario">
            <i class="bi bi-plus-lg me-2"></i>Nuevo usuario
        </button>
    </div>

    <!-- Tabla -->
    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Usuario</th>
                        <th>Nombre completo</th>
                        <th>Rol</th>
                        <th>Correo</th>
                        <th>Estado</th>
                        <th>Creación</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.idUsuario}"></td>
                        <td>
                            <i class="bi bi-person-circle me-1 text-secondary"></i>
                            <span th:text="${u.username}"></span>
                        </td>
                        <td th:text="${u.nombreUsuario + ' ' + u.apellidoUsuario}"></td>
                        <td>
                            <span class="badge bg-primary bg-opacity-10 text-primary"
                                  th:text="${u.nombreRol}"></span>
                        </td>
                        <td th:text="${u.correoUsuario}"></td>
                        <td>
                            <span th:if="${u.estadoUsuario == 1}"
                                  class="badge badge-activo px-2 py-1 rounded-pill">
                                Activo
                            </span>
                            <span th:unless="${u.estadoUsuario == 1}"
                                  class="badge badge-inactivo px-2 py-1 rounded-pill">
                                Inactivo
                            </span>
                        </td>
                        <td th:text="${#temporals.format(u.fechaCreacion, 'dd/MM/yyyy')}"></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-1"
                                    th:data-id="${u.idUsuario}"
                                    th:data-username="${u.username}"
                                    th:data-nombre="${u.nombreUsuario}"
                                    th:data-apellido="${u.apellidoUsuario}"
                                    th:data-correo="${u.correoUsuario}"
                                    th:data-rol="${u.idRol}"
                                    onclick="abrirEditar(this)">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger"
                                    th:data-id="${u.idUsuario}"
                                    th:data-username="${u.username}"
                                    onclick="confirmarDesactivar(this)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No hay usuarios registrados
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Crear Usuario -->
    <div class="modal fade" id="modalCrearUsuario" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-person-plus me-2"></i>Nuevo Usuario
                    </h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                </div>
                <form id="formCrear">
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Usuario *</label>
                                <input type="text" class="form-control"
                                       id="crearUsername" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Contraseña *</label>
                                <input type="password" class="form-control"
                                       id="crearClave" required/>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Nombre *</label>
                                <input type="text" class="form-control"
                                       id="crearNombre" required/>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Apellido *</label>
                                <input type="text" class="form-control"
                                       id="crearApellido" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Correo</label>
                                <input type="email" class="form-control"
                                       id="crearCorreo"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Rol *</label>
                                <select class="form-select" id="crearRol" required>
                                    <option value="">Seleccione...</option>
                                    <option th:each="r : ${roles}"
                                            th:value="${r.idRol}"
                                            th:text="${r.nombreRol}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Editar Usuario -->
    <div class="modal fade" id="modalEditarUsuario" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil me-2"></i>Editar Usuario
                    </h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>
                <form id="formEditar">
                    <input type="hidden" id="editarId"/>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Usuario</label>
                                <input type="text" class="form-control"
                                       id="editarUsername" readonly/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    Nueva contraseña
                                    <small class="text-muted">(dejar vacío para no cambiar)</small>
                                </label>
                                <input type="password" class="form-control"
                                       id="editarClave"/>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Nombre *</label>
                                <input type="text" class="form-control"
                                       id="editarNombre" required/>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Apellido *</label>
                                <input type="text" class="form-control"
                                       id="editarApellido" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Correo</label>
                                <input type="email" class="form-control"
                                       id="editarCorreo"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Rol *</label>
                                <select class="form-select" id="editarRol" required>
                                    <option th:each="r : ${roles}"
                                            th:value="${r.idRol}"
                                            th:text="${r.nombreRol}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save me-1"></i>Actualizar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
    const CTX = /*[[@{/}]]*/ '/';

    /* ── Crear usuario ───────────────────────────────────────────────────── */
    document.getElementById('formCrear').addEventListener('submit', async function(e) {
        e.preventDefault();
        const body = {
            username:        document.getElementById('crearUsername').value,
            clave:           document.getElementById('crearClave').value,
            nombreUsuario:   document.getElementById('crearNombre').value,
            apellidoUsuario: document.getElementById('crearApellido').value,
            correoUsuario:   document.getElementById('crearCorreo').value,
            idRol:           parseInt(document.getElementById('crearRol').value),
            idEntidad:       1
        };
        const r = await fetch(CTX + 'api/usuarios', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        });
        if (r.ok) { location.reload(); }
        else {
            const err = await r.json();
            alert('Error: ' + (err.mensaje || 'No se pudo crear el usuario'));
        }
    });

    /* ── Abrir modal editar ──────────────────────────────────────────────── */
    function abrirEditar(btn) {
        document.getElementById('editarId').value       = btn.dataset.id;
        document.getElementById('editarUsername').value = btn.dataset.username;
        document.getElementById('editarNombre').value   = btn.dataset.nombre;
        document.getElementById('editarApellido').value = btn.dataset.apellido;
        document.getElementById('editarCorreo').value   = btn.dataset.correo;
        document.getElementById('editarRol').value      = btn.dataset.rol;
        document.getElementById('editarClave').value    = '';
        new bootstrap.Modal(
            document.getElementById('modalEditarUsuario')
        ).show();
    }

    /* ── Guardar edición ─────────────────────────────────────────────────── */
    document.getElementById('formEditar').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id   = document.getElementById('editarId').value;
        const clave = document.getElementById('editarClave').value;
        const body = {
            username:        document.getElementById('editarUsername').value,
            nombreUsuario:   document.getElementById('editarNombre').value,
            apellidoUsuario: document.getElementById('editarApellido').value,
            correoUsuario:   document.getElementById('editarCorreo').value,
            idRol:           parseInt(document.getElementById('editarRol').value),
            idEntidad:       1
        };
        if (clave) body.clave = clave;
        const r = await fetch(CTX + 'api/usuarios/' + id, {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        });
        if (r.ok) { location.reload(); }
        else {
            const err = await r.json();
            alert('Error: ' + (err.mensaje || 'No se pudo actualizar'));
        }
    });

    /* ── Confirmar desactivar ────────────────────────────────────────────── */
    function confirmarDesactivar(btn) {
        if (confirm('¿Desactivar el usuario "' + btn.dataset.username + '"?')) {
            fetch(CTX + 'api/usuarios/' + btn.dataset.id, { method: 'DELETE' })
                .then(() => location.reload());
        }
    }
</script>
</body>
</html>
