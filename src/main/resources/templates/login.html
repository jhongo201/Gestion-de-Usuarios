<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar sesión — IDIGER RC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Franja superior institucional ── */
        .top-bar {
            background: #3D682C;
            height: 8px;
            width: 100%;
        }

        /* ── Contenedor principal centrado ── */
        .login-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* ── Logo ── */
        .logo-container {
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo-container img {
            max-width: 320px;
            width: 100%;
            height: auto;
        }

        /* ── Card del formulario ── */
        .login-card {
            width: 100%;
            max-width: 400px;
            border: 1px solid #dde3d8;
            border-radius: 4px;
            padding: 2rem 2.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
            background: #fff;
        }

        .login-card h5 {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: .02em;
        }

        /* ── Campos ── */
        .form-label {
            font-size: .85rem;
            font-weight: 500;
            color: #444;
            margin-bottom: .3rem;
        }

        .form-control {
            border: 1px solid #c8d4c0;
            border-radius: 3px;
            font-size: .9rem;
            padding: .55rem .75rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            border-color: #3D682C;
            box-shadow: 0 0 0 3px rgba(61,104,44,.15);
            outline: none;
        }

        .input-group .form-control {
            border-right: none;
        }

        .input-group .btn-outline-secondary {
            border: 1px solid #c8d4c0;
            border-left: none;
            background: #fff;
            color: #666;
            border-radius: 0 3px 3px 0;
        }

        .input-group .btn-outline-secondary:hover {
            background: #f5f7f4;
        }

        /* ── Botón ingresar ── */
        .btn-ingresar {
            background-color: #3D682C;
            color: #fff;
            border: none;
            border-radius: 3px;
            width: 100%;
            padding: .65rem;
            font-size: .95rem;
            font-weight: 600;
            letter-spacing: .03em;
            transition: background-color .2s;
            margin-top: .5rem;
        }

        .btn-ingresar:hover {
            background-color: #5FA831;
            color: #fff;
        }

        .btn-ingresar:active {
            background-color: #2d5020;
        }

        /* ── Alertas ── */
        .alert {
            font-size: .85rem;
            padding: .6rem .9rem;
            border-radius: 3px;
            margin-bottom: 1rem;
        }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            font-size: .75rem;
            color: #888;
            padding: 1rem;
            border-top: 1px solid #eee;
        }

        /* ── Franja inferior ── */
        .bottom-bar {
            background: #3D682C;
            height: 4px;
            width: 100%;
        }

        @media (max-width: 480px) {
            .login-card { padding: 1.5rem; }
            .logo-container img { max-width: 240px; }
        }
    </style>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

    <!-- Franja superior verde institucional -->
    <div class="top-bar"></div>

    <div class="login-wrapper">

        <!-- Logo institucional -->
        <div class="logo-container">
            <img th:src="@{/images/logo-idiger.png}"
                 alt="IDIGER — Instituto Distrital de Gestión de Riesgos y Cambio Climático"/>
        </div>

        <!-- Card de login -->
        <div class="login-card">
            <h5>Formulario de Ingreso</h5>

            <!-- Alerta error -->
            <div th:if="${param.error}"
                 class="alert alert-danger d-flex align-items-center gap-2"
                 role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>Usuario o contraseña incorrectos.</span>
            </div>

            <!-- Alerta logout -->
            <div th:if="${param.logout}"
                 class="alert alert-success d-flex align-items-center gap-2"
                 role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <span>Sesión cerrada correctamente.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <!-- Usuario -->
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"
                              style="background:#f5f7f4;border:1px solid #c8d4c0;
                                     border-right:none;border-radius:3px 0 0 3px">
                            <i class="bi bi-person" style="color:#3D682C"></i>
                        </span>
                        <input type="text" id="username" name="username"
                               class="form-control"
                               placeholder="Ingrese su usuario"
                               autocomplete="username" autofocus required/>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"
                              style="background:#f5f7f4;border:1px solid #c8d4c0;
                                     border-right:none;border-radius:3px 0 0 3px">
                            <i class="bi bi-lock" style="color:#3D682C"></i>
                        </span>
                        <input type="password" id="password" name="password"
                               class="form-control"
                               placeholder="Ingrese su contraseña"
                               autocomplete="current-password" required/>
                        <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePass()" tabindex="-1">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Alerta captcha inválido -->
                <div th:if="${param.captcha}"
                    class="alert alert-danger d-flex align-items-center gap-2"
                    role="alert">
                    <i class="bi bi-shield-x-fill"></i>
                    <span>Por favor confirma que no eres un robot.</span>
                </div>

                <!-- reCAPTCHA widget -->
                <div class="g-recaptcha"
     th:attr="data-sitekey=${recaptchaSiteKey}">
</div>
                <button type="submit" class="btn-ingresar">
                    Ingresar
                </button>
            </form>
        </div>

    </div>

    <!-- Footer -->
    <div class="login-footer">
        © 2026 IDIGER — Alcaldía Mayor de Bogotá D.C. — Uso interno
    </div>

    <!-- Franja inferior -->
    <div class="bottom-bar"></div>

<script>
    function togglePass() {
        const inp  = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        inp.type   = inp.type === 'password' ? 'text' : 'password';
        icon.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
</script>
</body>
</html>
