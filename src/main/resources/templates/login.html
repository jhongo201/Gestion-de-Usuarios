<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar sesión — IDIGER RC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card card p-4 p-md-5">

        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center
                        rounded-circle bg-primary mb-3"
                 style="width:64px;height:64px">
                <i class="bi bi-shield-lock-fill text-white fs-3"></i>
            </div>
            <h5 class="fw-bold text-dark mb-0">Módulo Reportes Contractuales</h5>
            <small class="text-muted">
                IDIGER — Instituto Distrital de Gestión de Riesgos
            </small>
        </div>

        <!-- Alerta de error -->
        <div th:if="${param.error}"
             class="alert alert-danger d-flex align-items-center gap-2 py-2"
             role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Usuario o contraseña incorrectos.</span>
        </div>

        <!-- Alerta de logout -->
        <div th:if="${param.logout}"
             class="alert alert-success d-flex align-items-center gap-2 py-2"
             role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span>Sesión cerrada correctamente.</span>
        </div>

        <!-- Formulario -->
        <form th:action="@{/login}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">
                    <i class="bi bi-person me-1"></i>Usuario
                </label>
                <input type="text" id="username" name="username"
                       class="form-control form-control-lg"
                       placeholder="Ingrese su usuario"
                       autocomplete="username" autofocus required/>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <div class="input-group">
                    <input type="password" id="password" name="password"
                           class="form-control form-control-lg"
                           placeholder="Ingrese su contraseña"
                           autocomplete="current-password" required/>
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="togglePass()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100 btn-lg fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
        </form>

        <hr class="my-4"/>
        <p class="text-center text-muted small mb-0">
            © 2026 IDIGER — Uso interno
        </p>
    </div>
</div>

<script>
    function togglePass() {
        const inp  = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (inp.type === 'password') {
            inp.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            inp.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
