<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Cambio obligatorio de contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: #f6f8f5;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1f2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .change-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border: 1px solid #d9e2d4;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
            padding: 2rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 1.6rem;
        }

        .logo-container img {
            max-width: 280px;
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: .75rem;
            color: #102010;
        }

        .subtitle {
            text-align: center;
            color: #526052;
            font-size: .95rem;
            margin-bottom: 1.8rem;
            line-height: 1.45;
        }

        .form-label {
            font-size: .92rem;
            font-weight: 600;
            color: #1f2a1f;
            margin-bottom: .45rem;
        }

        .form-control {
            border: 1px solid #b9cbb1;
            border-radius: 4px;
            min-height: 38px;
            font-size: .95rem;
        }

        .form-control:focus {
            border-color: #3d682c;
            box-shadow: 0 0 0 .2rem rgba(61, 104, 44, .16);
        }

        .input-group .form-control {
            border-right: none;
        }

        .input-group .btn-outline-secondary {
            border-color: #b9cbb1;
            color: #526052;
            background: #fff;
        }

        .input-group .btn-outline-secondary:hover {
            background: #f2f6f0;
            color: #2d4f20;
        }

        .policy {
            font-size: .84rem;
            color: #526052;
        }

        .btn-update {
            width: 100%;
            background: #3d682c;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: .68rem 1rem;
            border-radius: 5px;
        }

        .btn-update:hover {
            background: #315823;
            color: #fff;
        }

        .alert {
            font-size: .9rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <main class="change-card">

        <div class="logo-container">
            <img th:src="@{/images/logo-idiger.png}"
                 alt="IDIGER - Instituto Distrital de Gestión de Riesgos y Cambio Climático" />
        </div>

        <h1>Cambio obligatorio de contraseña</h1>

        <p class="subtitle">
            Por seguridad, debes actualizar tu contraseña antes de continuar.
        </p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}">
            No fue posible cambiar la contraseña.
        </div>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}">
            Contraseña actualizada correctamente.
        </div>

        <form id="cambioClaveForm"
              th:action="@{/cambiar-clave}"
              th:object="${cambioClaveRequest}"
              method="post">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="mb-3">
                <label for="nuevaClave" class="form-label">
                    Nueva contraseña
                </label>

                <div class="input-group">
                    <input type="password"
                           class="form-control"
                           th:field="*{nuevaClave}"
                           id="nuevaClave"
                           required
                           autocomplete="new-password" />

                    <button class="btn btn-outline-secondary"
                            type="button"
                            data-password-toggle="nuevaClave"
                            aria-label="Mostrar u ocultar nueva contraseña">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <div id="claveMsg" class="policy mt-1">
                    Mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial.
                </div>

                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('nuevaClave')}"
                     th:errors="*{nuevaClave}">
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmarClave" class="form-label">
                    Confirmar contraseña
                </label>

                <div class="input-group">
                    <input type="password"
                           class="form-control"
                           th:field="*{confirmarClave}"
                           id="confirmarClave"
                           required
                           autocomplete="new-password" />

                    <button class="btn btn-outline-secondary"
                            type="button"
                            data-password-toggle="confirmarClave"
                            aria-label="Mostrar u ocultar confirmación de contraseña">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <div id="confirmarMsg" class="policy mt-1"></div>

                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('confirmarClave')}"
                     th:errors="*{confirmarClave}">
                </div>
            </div>

            <button type="submit" class="btn btn-update">
                Actualizar contraseña
            </button>
        </form>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const nuevaClave = document.getElementById('nuevaClave');
            const confirmarClave = document.getElementById('confirmarClave');
            const form = document.getElementById('cambioClaveForm');

            /*
             * Botones de mostrar/ocultar contraseña.
             * Se usa data-password-toggle para evitar conflictos con otras funciones.
             */
            document.querySelectorAll('[data-password-toggle]').forEach(function (button) {
                button.addEventListener('click', function () {
                    const inputId = button.getAttribute('data-password-toggle');
                    const input = document.getElementById(inputId);
                    const icon = button.querySelector('i');

                    if (!input || !icon) {
                        return;
                    }

                    const mostrar = input.type === 'password';
                    input.type = mostrar ? 'text' : 'password';
                    icon.className = mostrar ? 'bi bi-eye-slash' : 'bi bi-eye';
                });
            });

            /*
             * Validación visual mientras el usuario escribe.
             * La validación definitiva sigue estando en el backend.
             */
            nuevaClave.addEventListener('input', function () {
                validarClave();
                validarConfirmacion();
            });

            confirmarClave.addEventListener('input', function () {
                validarConfirmacion();
            });

            form.addEventListener('submit', function (e) {
                const clave = nuevaClave.value;
                const confirmar = confirmarClave.value;

                if (!claveCumplePolitica(clave)) {
                    e.preventDefault();
                    validarClave();
                    nuevaClave.focus();
                    return;
                }

                if (clave !== confirmar) {
                    e.preventDefault();
                    validarConfirmacion();
                    confirmarClave.focus();
                }
            });
        });

        function claveCumplePolitica(clave) {
            return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(clave);
        }

        function validarClave() {
            const clave = document.getElementById('nuevaClave').value;
            const msg = document.getElementById('claveMsg');

            if (!clave) {
                msg.className = 'policy mt-1';
                msg.textContent = 'Mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial.';
                return;
            }

            if (claveCumplePolitica(clave)) {
                msg.className = 'policy mt-1 text-success';
                msg.textContent = 'La contraseña cumple la política de seguridad.';
            } else {
                msg.className = 'policy mt-1 text-danger';
                msg.textContent = 'La contraseña no cumple la política de seguridad.';
            }
        }

        function validarConfirmacion() {
            const clave = document.getElementById('nuevaClave').value;
            const confirmar = document.getElementById('confirmarClave').value;
            const msg = document.getElementById('confirmarMsg');

            if (!confirmar) {
                msg.className = 'policy mt-1';
                msg.textContent = '';
                return;
            }

            if (clave === confirmar) {
                msg.className = 'policy mt-1 text-success';
                msg.textContent = 'Las contraseñas coinciden.';
            } else {
                msg.className = 'policy mt-1 text-danger';
                msg.textContent = 'Las contraseñas no coinciden.';
            }
        }
    </script>

</body>

</html>
